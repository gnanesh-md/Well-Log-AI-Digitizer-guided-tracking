<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes pumpRock {
    0%   { transform: rotate(-18deg); }
    50%  { transform: rotate(18deg); }
    100% { transform: rotate(-18deg); }
  }
  @keyframes flameRed {
    0%,100% { transform: scaleY(1) scaleX(1); opacity: 1; }
    30%     { transform: scaleY(1.25) scaleX(0.85); opacity: 0.85; }
    60%     { transform: scaleY(0.9) scaleX(1.1); opacity: 0.95; }
  }
  @keyframes flameGreen {
    0%,100% { transform: scaleY(1.1) scaleX(1); opacity: 1; }
    40%     { transform: scaleY(0.85) scaleX(1.15); opacity: 0.8; }
    70%     { transform: scaleY(1.2) scaleX(0.9); opacity: 0.9; }
  }
  @keyframes arcFill {
    0%   { stroke-dashoffset: 502; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes dotPulse {
    0%,100% { opacity: 0.25; }
    50%     { opacity: 1; }
  }
  @keyframes glowPipe {
    0%,100% { opacity: 0.3; }
    50%     { opacity: 1; }
  }
  @keyframes tankGlow {
    0%,100% { opacity: 0.4; }
    50%     { opacity: 1; }
  }
  @keyframes spinDot {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e53935"/>
      <stop offset="50%"  stop-color="#cc5500"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>

  <!-- Decorative rings -->
  <circle cx="340" cy="340" r="300" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 6"/>
  <circle cx="340" cy="340" r="260" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 8"/>

  <!-- Left side dots -->
  <circle cx="55" cy="260" r="4" fill="#ccc" opacity="0.5"/>
  <circle cx="51" cy="300" r="4" fill="#ccc" opacity="0.4"/>
  <circle cx="51" cy="340" r="4" fill="#ccc" opacity="0.3"/>
  <circle cx="54" cy="380" r="4" fill="#ccc" opacity="0.4"/>
  <circle cx="60" cy="418" r="4" fill="#ccc" opacity="0.5"/>

  <!-- Progress arc track -->
  <circle cx="340" cy="340" r="300"
    fill="none" stroke="#e0e0e0" stroke-width="8" stroke-linecap="round"
    stroke-dasharray="1256 1570" stroke-dashoffset="-251"
    transform="rotate(-90 340 340)"/>

  <!-- Animated progress arc (red → orange → green) -->
  <circle cx="340" cy="340" r="300"
    fill="none" stroke="url(#arcGrad)" stroke-width="8" stroke-linecap="round"
    stroke-dasharray="502 1570" stroke-dashoffset="502"
    transform="rotate(-90 340 340)"
    style="animation: arcFill 2.5s ease-in-out infinite alternate;"/>

  <!-- Spinning green indicator dot -->
  <g style="transform-origin:340px 340px; animation: spinDot 2.5s linear infinite;">
    <circle cx="340" cy="40" r="14" fill="white" stroke="#ccc" stroke-width="1"/>
    <circle cx="340" cy="40" r="9"  fill="#2e7d32"/>
  </g>

  <!-- Ground line -->
  <line x1="160" y1="430" x2="520" y2="430" stroke="#111" stroke-width="2" stroke-linecap="round"/>

  <!-- ═══════════ FLARE TOWER ═══════════ -->
  <rect x="217" y="250" width="10" height="180" fill="#111" rx="1"/>
  <line x1="207" y1="340" x2="237" y2="280" stroke="#111" stroke-width="1.5"/>
  <line x1="237" y1="340" x2="207" y2="280" stroke="#111" stroke-width="1.5"/>
  <rect x="213" y="240" width="18" height="14" fill="#222" rx="2"/>

  <!-- Red flame -->
  <g style="transform-origin:222px 240px; animation: flameRed 1.1s ease-in-out infinite;">
    <path d="M222,240 C214,224 210,208 218,196 C220,210 226,196 228,188
             C234,202 236,218 230,232 C226,238 222,240 222,240Z" fill="#e53935"/>
  </g>
  <!-- Green flame -->
  <g style="transform-origin:222px 240px; animation: flameGreen 1.4s ease-in-out infinite 0.3s;">
    <path d="M222,240 C219,226 224,212 222,200 C226,208 228,200 230,194
             C232,206 228,222 226,234 C224,239 222,240 222,240Z" fill="#2e7d32" opacity="0.9"/>
  </g>

  <!-- Rising sparks -->
  <circle cx="218" cy="220" r="3" fill="#e53935" opacity="0.7">
    <animate attributeName="cy"      values="220;200;220" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7"   dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="225" cy="215" r="2" fill="#2e7d32" opacity="0.6">
    <animate attributeName="cy"      values="215;195;215" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6"   dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="225" r="2.5" fill="#e53935" opacity="0.5">
    <animate attributeName="cy"      values="225;205;225" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5"   dur="2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Decorative glow dots near flame -->
  <circle cx="205" cy="200" r="3"   fill="#e53935" opacity="0.5" style="animation: dotPulse 1.2s infinite 0.2s;"/>
  <circle cx="240" cy="205" r="2.5" fill="#2e7d32" opacity="0.6" style="animation: dotPulse 1.5s infinite 0.5s;"/>
  <circle cx="245" cy="185" r="2"   fill="#2e7d32" opacity="0.4" style="animation: dotPulse 1.8s infinite;"/>

  <!-- ═══════════ OIL DRUM (left) ═══════════ -->
  <rect x="195" y="390" width="30" height="40" fill="#111" rx="3"/>
  <ellipse cx="210" cy="390" rx="15" ry="5" fill="#222"/>
  <path d="M210,402 C207,398 204,394 207,392 C210,390 213,392 210,402Z" fill="#2e7d32" opacity="0.9"/>

  <!-- Pipe from drum to pump -->
  <line x1="225" y1="415" x2="275" y2="415" stroke="#111" stroke-width="3"/>
  <line x1="226" y1="415" x2="274" y2="415" stroke="#2e7d32" stroke-width="2" opacity="0.5"
        style="animation: glowPipe 1.5s infinite;"/>
  <circle r="4" fill="#2e7d32" opacity="0.8">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M226,415 L274,415"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══════════ PUMP JACK ═══════════ -->
  <!-- Frame -->
  <line x1="305" y1="430" x2="325" y2="310" stroke="#111" stroke-width="3"/>
  <line x1="375" y1="430" x2="355" y2="310" stroke="#111" stroke-width="3"/>
  <line x1="313" y1="400" x2="367" y2="400" stroke="#111" stroke-width="2"/>
  <line x1="320" y1="360" x2="360" y2="360" stroke="#111" stroke-width="2"/>
  <line x1="313" y1="400" x2="335" y2="360" stroke="#111" stroke-width="1.5"/>
  <line x1="367" y1="400" x2="345" y2="360" stroke="#111" stroke-width="1.5"/>
  <line x1="325" y1="310" x2="355" y2="310" stroke="#111" stroke-width="4"/>
  <rect x="334" y="304" width="12" height="12" fill="#333" rx="2"/>
  <!-- Motor -->
  <rect x="298" y="408" width="30" height="22" fill="#1a1a1a" rx="3"/>
  <circle cx="320" cy="419" r="8" fill="#222" stroke="#444" stroke-width="1"/>
  <!-- Counterweight -->
  <circle cx="370" cy="408" r="16" fill="#111" stroke="#444" stroke-width="1.5"/>
  <!-- Rocking beam -->
  <g style="transform-origin:340px 310px; animation: pumpRock 1.6s ease-in-out infinite;">
    <rect x="280" y="304" width="120" height="12" fill="#111" rx="3"/>
    <path d="M280,304 L268,304 L265,316 L275,320 L285,316 Z" fill="#111"/>
    <line x1="270" y1="320" x2="270" y2="430" stroke="#333" stroke-width="3"/>
    <rect x="388" y="298" width="40" height="22" fill="#222" rx="4"/>
  </g>
  <!-- Well head -->
  <rect x="262" y="428" width="16" height="10" fill="#222" rx="2"/>
  <rect x="265" y="426" width="10" height="4"  fill="#333" rx="1"/>

  <!-- Pipe well → separator -->
  <path d="M278,420 Q310,420 320,415 L390,415" fill="none" stroke="#111" stroke-width="3"/>
  <circle r="4" fill="#2e7d32" opacity="0.8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M278,420 Q310,420 320,415 L390,415"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══════════ SEPARATOR + STORAGE TANK ═══════════ -->
  <rect x="385" y="408" width="16" height="16" fill="#111" rx="2"/>
  <line x1="393" y1="408" x2="393" y2="400" stroke="#111" stroke-width="2"/>

  <!-- Separator vessel -->
  <rect x="400" y="330" width="34" height="100" fill="#111" rx="4"/>
  <ellipse cx="417" cy="330" rx="17" ry="7" fill="#222"/>
  <ellipse cx="417" cy="430" rx="17" ry="7" fill="#1a1a1a"/>
  <!-- Level indicator -->
  <rect x="429" y="380" width="5" height="45" fill="#e0e0e0" rx="2" opacity="0.3"/>
  <rect x="429" y="390" width="5" height="35" fill="#2e7d32" rx="2"
        style="animation: tankGlow 2s infinite;"/>
  <!-- Pipes off separator -->
  <line x1="400" y1="360" x2="387" y2="360" stroke="#111" stroke-width="2"/>
  <line x1="434" y1="360" x2="445" y2="360" stroke="#111" stroke-width="2"/>
  <line x1="445" y1="360" x2="445" y2="395" stroke="#111" stroke-width="2"/>

  <!-- Storage tank -->
  <rect x="436" y="390" width="44" height="40" fill="#111" rx="4"/>
  <ellipse cx="458" cy="390" rx="22" ry="8" fill="#1a1a1a"/>
  <ellipse cx="458" cy="430" rx="22" ry="8" fill="#111"/>
  <path d="M458,408 C454,402 450,396 454,393 C458,390 462,393 458,408Z"
        fill="#2e7d32" opacity="0.9" style="animation: tankGlow 1.8s infinite 0.4s;"/>
  <line x1="436" y1="410" x2="434" y2="410" stroke="#111" stroke-width="2"/>

  <!-- ═══════════ LOADING DOTS ROW ═══════════ -->
  <circle cx="280" cy="470" r="5" fill="#888"/>
  <circle cx="296" cy="470" r="5" fill="#888"/>
  <circle cx="312" cy="470" r="5" fill="#888"/>
  <circle cx="328" cy="470" r="5" fill="#888"/>
  <circle cx="344" cy="470" r="5" fill="#2e7d32" style="animation: dotPulse 1s infinite;"/>
  <circle cx="360" cy="470" r="5" fill="#555"/>
  <circle cx="376" cy="470" r="5" fill="#333"/>
  <circle cx="392" cy="470" r="5" fill="#222"/>

  <!-- Loading label -->
  <text x="340" y="506" text-anchor="middle"
        font-family="sans-serif" font-size="16" fill="#555">Extracting data from image...</text>

  <!-- Bottom-right decorative dots -->
  <circle cx="520" cy="490" r="5"   fill="#2e7d32" opacity="0.6" style="animation: dotPulse 1.3s infinite;"/>
  <circle cx="540" cy="510" r="3"   fill="#2e7d32" opacity="0.4" style="animation: dotPulse 1.7s infinite 0.3s;"/>
  <circle cx="505" cy="515" r="3.5" fill="#888"    opacity="0.4"/>
</svg>