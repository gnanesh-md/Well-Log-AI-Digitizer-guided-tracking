server {
    listen 80;
    server_name _;

    # js-backend APIs
    location = /register { proxy_pass http://localhost:5000; }
    location = /login { proxy_pass http://localhost:5000; }
    location = /forgot-password { proxy_pass http://localhost:5000; }
    location = /reset-password { proxy_pass http://localhost:5000; }
    location = /projects { proxy_pass http://localhost:5000; }
    location ~ ^/projects/ { proxy_pass http://localhost:5000; }
    location = /save-points { proxy_pass http://localhost:5000; }
    location ~ ^/export-points/ { proxy_pass http://localhost:5000; }
    location = /dashboard { proxy_pass http://localhost:5000; }

    # python-multiline APIs
    location = /segment-and-graph { proxy_pass http://localhost:8123; }
    location = /tiff-chunk-detect { proxy_pass http://localhost:8123; }
    location = /create-las-file { proxy_pass http://localhost:8123; }
    location = /generate-las-base64 { proxy_pass http://localhost:8123; }
    location = /create-las-from-coords { proxy_pass http://localhost:8123; }

    # Frontend (React/Vite)
    location / {
        proxy_pass http://localhost:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
